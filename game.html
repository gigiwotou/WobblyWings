<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不敢停下 - 游戏中</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="clock-container">
        <div class="analog-clock">
            <div class="clock-face">
                <div class="hour-hand" id="hourHand"></div>
                <div class="minute-hand" id="minuteHand"></div>
                <div class="center-dot"></div>
                <div class="clock-numbers">
                    <div class="number">12</div>
                    <div class="number">3</div>
                    <div class="number">6</div>
                    <div class="number">9</div>
                </div>
            </div>
        </div>
    </div>
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>
    <script src="js/game-engine.js"></script>
    <script src="js/particle.js"></script>
    <script src="js/paper-plane.js"></script>
    <script src="js/enemy.js"></script>
    <script src="js/enemies/straight.js"></script>
    <script src="js/enemies/tracker.js"></script>
    <script src="js/enemies/giant.js"></script>
    <script src="js/enemies/left-to-right.js"></script>
    <script src="js/collision.js"></script>
    <script src="js/game-state.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
