<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不敢停下 - 游戏结束</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-over">
            <h1>游戏结束</h1>
            <div class="final-score">
                <p>最终得分: <span id="finalScore">0</span></p>
                <p>游戏时间: <span id="finalTime">0</span>秒</p>
            </div>
            <button class="restart-button" onclick="window.location.href='game.html'">重新开始</button>
            <button class="menu-button" onclick="window.location.href='index.html'">返回主菜单</button>
        </div>
    </div>
    <script>
        // 从URL参数中获取得分和时间
        const params = new URLSearchParams(window.location.search);
        const score = params.get('score') || 0;
        const time = params.get('time') || 0;
        
        document.getElementById('finalScore').textContent = score;
        document.getElementById('finalTime').textContent = time;
    </script>
</body>
</html>
